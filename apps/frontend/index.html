<!doctype html>
<html lang="pt-BR" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studyflow AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#2b2bee',
              'background-light': '#f6f6f8',
              'background-dark': '#101022',
              'card-light': '#ffffff',
              'card-dark': '#1a1a2e',
              'text-primary-light': '#0d0d1b',
              'text-secondary-light': '#4c4c9a',
              'text-primary-dark': '#ffffff',
              'text-secondary-dark': '#a0a0b0',
              'border-light': '#cfcfe7',
              'border-dark': '#2d2d42',
              'surface-light': '#ffffff',
              'surface-dark': '#1a1a2e'
            },
            fontFamily: {
              display: ['Inter', 'sans-serif'],
              sans: ['Inter', 'sans-serif'],
              lexend: ['Lexend', 'sans-serif']
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              '2xl': '1rem',
              full: '9999px'
            }
          }
        }
      };
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #334155;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .material-symbols-outlined.fill {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .bg-striped {
        background-image: linear-gradient(
          45deg,
          rgba(0, 0, 0, 0.03) 25%,
          transparent 25%,
          transparent 50%,
          rgba(0, 0, 0, 0.03) 50%,
          rgba(0, 0, 0, 0.03) 75%,
          transparent 75%,
          transparent
        );
        background-size: 20px 20px;
      }
    </style>
  </head>
  <body class="bg-background-light dark:bg-background-dark text-text-primary-light dark:text-text-primary-dark transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
